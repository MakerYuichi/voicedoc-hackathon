version: '3.8'

services:
  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: voicedoc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build: .
    container_name: voicedoc-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker for parallel agent execution
  celery-worker:
    build: .
    container_name: voicedoc-celery-worker
    env_file:
      - .env
    depends_on:
      - redis
      - api
    volumes:
      - .:/app
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=4

  # Celery Beat for scheduled tasks (optional)
  celery-beat:
    build: .
    container_name: voicedoc-celery-beat
    env_file:
      - .env
    depends_on:
      - redis
      - celery-worker
    volumes:
      - .:/app
    command: celery -A app.celery_app.celery_app beat --loglevel=info

  # Flower for Celery monitoring
  flower:
    build: .
    container_name: voicedoc-flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery-worker
    volumes:
      - .:/app
    command: celery -A app.celery_app.celery_app flower --port=5555

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: voicedoc-network
